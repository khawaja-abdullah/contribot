version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "Friday"
      time: "18:00"
      timezone: "Asia/Karachi"
    open-pull-requests-limit: 5
    reviewers:
      - "khawaja-abdullah"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
      testing:
        patterns:
          - "org.junit:*"
          - "org.mockito:*"
          - "org.testcontainers:*"
          - "org.assertj:*"
      jackson:
        patterns:
          - "com.fasterxml.jackson:*"
      hibernate:
        patterns:
          - "org.hibernate:*"
          - "jakarta.persistence:*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "Friday"
      time: "19:00"
      timezone: "Asia/Karachi"
    open-pull-requests-limit: 4
    reviewers:
      - "khawaja-abdullah"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "ci"