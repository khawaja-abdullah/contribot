name: background-jobs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  issue-search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Restore previous state
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: state.json
          key: issue-search-${{ github.run_id }}
          restore-keys: issue-search-
      - name: Show previous state content
        if: always()
        run: |
          ls -l state.json || echo "file does not exist yet"
          cat state.json || true
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Run contribot
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SPRING_MAIL_USERNAME : ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD : ${{ secrets.SPRING_MAIL_PASSWORD }}
        run: |
          ./mvnw spring-boot:run \
          -Dspring-boot.run.arguments="--github.issue-search.job.execution-file=state.json"
      - name: Force save updated state
        if: always()
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: state.json
          key: issue-search-${{ github.run_id }}
      - name: Show current state content
        if: always()
        run: |
          ls -l state.json || echo "file does not exist yet"
          cat state.json || true